# This workflow builds a container image for the Streamlit app and deploys
# it to Azure App Service (Web App for Containers) using a publish profile.
#
# Required secret (preferred):
#   - AZURE_WEBAPP_PUBLISH_PROFILE
# Optional backward-compatible secret name:
#   - AZURE_FUNCTIONAPP_PUBLISH_PROFILE

name: Build and Deploy Streamlit Container to Azure Web App

on:
  push:
    branches: # List of branches to trigger deployment, e.g.:
      - main
      - feature/**
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  AZURE_WEBAPP_NAME: 'mlops-pipeline-app'   # set this to your Azure Web App name
  AZURE_WEBAPP_APP_PATH: 'simple-ml-model' # path to your app project folder
  CONTAINER_REGISTRY: 'ghcr.io'
  CONTAINER_IMAGE_NAME: 'mlops-pipeline-app'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      AZURE_FUNCTIONAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v4

    - name: 'Validate deployment auth configuration'
      shell: bash
      run: |
        if [ -z "${AZURE_WEBAPP_PUBLISH_PROFILE}" ] && [ -z "${AZURE_FUNCTIONAPP_PUBLISH_PROFILE}" ]; then
          echo "Missing publish profile secret. Set AZURE_WEBAPP_PUBLISH_PROFILE (preferred) or AZURE_FUNCTIONAPP_PUBLISH_PROFILE."
          exit 1
        fi

    - name: 'Compute container image reference'
      id: image
      shell: bash
      run: |
        OWNER_LOWER="$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')"
        IMAGE_REF="${{ env.CONTAINER_REGISTRY }}/${OWNER_LOWER}/${{ env.CONTAINER_IMAGE_NAME }}:${{ github.sha }}"
        echo "image=${IMAGE_REF}" >> "$GITHUB_OUTPUT"
        echo "Container image: ${IMAGE_REF}"

    - name: 'Log in to GHCR'
      uses: docker/login-action@v3
      with:
        registry: ${{ env.CONTAINER_REGISTRY }}
        username: ${{ github.actor }}
        password: ${{ github.token }}

    - name: 'Build and push container image'
      uses: docker/build-push-action@v6
      with:
        context: ${{ env.AZURE_WEBAPP_APP_PATH }}
        file: ${{ env.AZURE_WEBAPP_APP_PATH }}/Dockerfile
        push: true
        tags: ${{ steps.image.outputs.image }}

    - name: 'Deploy container image to Azure Web App'
      uses: azure/webapps-deploy@v3
      id: deploy
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        images: ${{ steps.image.outputs.image }}
        publish-profile: ${{ env.AZURE_WEBAPP_PUBLISH_PROFILE != '' && env.AZURE_WEBAPP_PUBLISH_PROFILE || env.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

    - name: 'Verify app is not serving default placeholder'
      shell: bash
      run: |
        APP_URL="${{ steps.deploy.outputs.webapp-url }}"
        if [ -z "$APP_URL" ]; then
          APP_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        fi

        echo "Checking deployed site at: ${APP_URL}"
        for _ in {1..36}; do
          HTTP_CODE="$(curl -sS -o /tmp/page.html -w "%{http_code}" "$APP_URL" || true)"
          PAGE_CONTENT="$(cat /tmp/page.html 2>/dev/null || true)"

          if [ "$HTTP_CODE" = "200" ] && ! echo "$PAGE_CONTENT" | grep -q "Hey, App Service developers!"; then
            echo "App content detected."
            exit 0
          fi

          if [ "$HTTP_CODE" = "503" ]; then
            echo "App returning 503 (container warming up or failing startup). Retrying in 10 seconds..."
          elif [ "$HTTP_CODE" = "200" ] && echo "$PAGE_CONTENT" | grep -q "Hey, App Service developers!"; then
            echo "Default placeholder still present. Retrying in 10 seconds..."
          else
            echo "Current HTTP status: ${HTTP_CODE:-unknown}. Retrying in 10 seconds..."
          fi

          sleep 10
        done

        echo "::error::Deployment completed but app did not become healthy in time. Confirm App Service is using image ${{ steps.image.outputs.image }}, container logs show successful startup, and registry pull access is configured (or GHCR package is public)."
        exit 1
