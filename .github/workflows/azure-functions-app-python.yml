# This workflow will build a Python app and deploy it to an Azure Functions App on Linux when a commit is pushed to your default branch.
#
# This workflow assumes you have already created the target Azure Functions app.
# For instructions see https://learn.microsoft.com/en-us/azure/azure-functions/create-first-function-vs-code-python?pivots=python-mode-configuration
#
# To configure this workflow:
# 1. Set up the following secrets in your repository:
#   - AZURE_FUNCTIONAPP_PUBLISH_PROFILE
#   - AZURE_RBAC_CREDENTIALS (required only if using RBAC instead of publish profile)
# 2. Change env variables for your configuration.
#
# For more information on:
#   - GitHub Actions for Azure: https://github.com/Azure/Actions
#   - Azure Functions Action: https://github.com/Azure/functions-action
#   - Publish Profile: https://github.com/Azure/functions-action#using-publish-profile-as-deployment-credential-recommended
#   - Azure Service Principal for RBAC: https://github.com/Azure/functions-action#using-azure-service-principal-for-rbac-as-deployment-credential
#
# For more samples to get started with GitHub Action workflows to deploy to Azure: https://github.com/Azure/actions-workflow-samples/tree/master/FunctionApp

name: Deploy Python project to Azure Function App

on:
  push:
    branches: # List of branches to trigger deployment, e.g.:
      - main
      - feature/**
  workflow_dispatch:

env:
  AZURE_FUNCTIONAPP_NAME: 'Loan-Predictor'   # set this to your function app name on Azure
  AZURE_FUNCTIONAPP_PACKAGE_PATH: 'simple-ml-model' # path to your function app project folder
  PYTHON_VERSION: '3.9'                     # set this to the python version to use (e.g. '3.6', '3.7', '3.8')

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      AZURE_FUNCTIONAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
      AZURE_RBAC_CREDENTIALS: ${{ secrets.AZURE_RBAC_CREDENTIALS }}
    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v4

    - name: 'Validate deployment auth configuration'
      shell: bash
      run: |
        if [ -z "${AZURE_FUNCTIONAPP_PUBLISH_PROFILE}" ] && [ -z "${AZURE_RBAC_CREDENTIALS}" ]; then
          echo "Either AZURE_FUNCTIONAPP_PUBLISH_PROFILE or AZURE_RBAC_CREDENTIALS must be configured as a repository secret."
          exit 1
        fi

    - name: 'Login via Azure CLI (RBAC fallback)'
      if: ${{ env.AZURE_FUNCTIONAPP_PUBLISH_PROFILE == '' && env.AZURE_RBAC_CREDENTIALS != '' }}
      uses: azure/login@v2
      with:
        creds: ${{ env.AZURE_RBAC_CREDENTIALS }}

    - name: Setup Python ${{ env.PYTHON_VERSION }} Environment
      uses: actions/setup-python@v4
      with:
        python-version: ${{ env.PYTHON_VERSION }}

    - name: 'Resolve Project Dependencies Using Pip'
      shell: bash
      run: |
        pushd './${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}'
        python -m pip install --upgrade pip
        pip install -r requirements.txt --target=".python_packages/lib/site-packages"
        popd

    - name: 'Run Azure Functions Action (Publish Profile)'
      if: ${{ env.AZURE_FUNCTIONAPP_PUBLISH_PROFILE != '' }}
      uses: Azure/functions-action@v1
      id: fa_publish_profile
      with:
        app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
        package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        publish-profile: ${{ env.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
        scm-do-build-during-deployment: true
        enable-oryx-build: true

    - name: 'Run Azure Functions Action (RBAC)'
      if: ${{ env.AZURE_FUNCTIONAPP_PUBLISH_PROFILE == '' && env.AZURE_RBAC_CREDENTIALS != '' }}
      uses: Azure/functions-action@v1
      id: fa_rbac
      with:
        app-name: ${{ env.AZURE_FUNCTIONAPP_NAME }}
        package: ${{ env.AZURE_FUNCTIONAPP_PACKAGE_PATH }}
        scm-do-build-during-deployment: true
        enable-oryx-build: true
