# This workflow deploys the Streamlit app to Azure App Service using a publish profile.
#
# Required secret (preferred):
#   - AZURE_WEBAPP_PUBLISH_PROFILE
# Optional backward-compatible secret name:
#   - AZURE_FUNCTIONAPP_PUBLISH_PROFILE

name: Deploy Python project to Azure Web App

on:
  push:
    branches: # List of branches to trigger deployment, e.g.:
      - main
      - feature/**
  workflow_dispatch:

env:
  AZURE_WEBAPP_NAME: 'mlops-pipeline-app'   # set this to your Azure Web App name
  AZURE_WEBAPP_PACKAGE_PATH: 'simple-ml-model' # path to your app project folder
  AZURE_WEBAPP_ZIP_PATH: 'release.zip'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: dev
    env:
      AZURE_WEBAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
      AZURE_FUNCTIONAPP_PUBLISH_PROFILE: ${{ secrets.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}
    steps:
    - name: 'Checkout GitHub Action'
      uses: actions/checkout@v4

    - name: 'Validate deployment auth configuration'
      shell: bash
      run: |
        if [ -z "${AZURE_WEBAPP_PUBLISH_PROFILE}" ] && [ -z "${AZURE_FUNCTIONAPP_PUBLISH_PROFILE}" ]; then
          echo "Missing publish profile secret. Set AZURE_WEBAPP_PUBLISH_PROFILE (preferred) or AZURE_FUNCTIONAPP_PUBLISH_PROFILE."
          exit 1
        fi

    - name: 'Package app content for zip deploy'
      shell: bash
      run: |
        pushd './${{ env.AZURE_WEBAPP_PACKAGE_PATH }}'
        zip -r '../${{ env.AZURE_WEBAPP_ZIP_PATH }}' . \
          -x '*.git*' \
          -x '__pycache__/*' \
          -x 'src/mlruns/*' \
          -x 'outputs/*'
        popd

    - name: 'Deploy to Azure Web App'
      uses: azure/webapps-deploy@v3
      id: deploy
      with:
        app-name: ${{ env.AZURE_WEBAPP_NAME }}
        package: ${{ env.AZURE_WEBAPP_ZIP_PATH }}
        publish-profile: ${{ env.AZURE_WEBAPP_PUBLISH_PROFILE != '' && env.AZURE_WEBAPP_PUBLISH_PROFILE || env.AZURE_FUNCTIONAPP_PUBLISH_PROFILE }}

    - name: 'Verify app is not serving default placeholder'
      shell: bash
      run: |
        APP_URL="${{ steps.deploy.outputs.webapp-url }}"
        if [ -z "$APP_URL" ]; then
          APP_URL="https://${{ env.AZURE_WEBAPP_NAME }}.azurewebsites.net"
        fi

        echo "Checking deployed site at: ${APP_URL}"
        for _ in {1..12}; do
          PAGE_CONTENT="$(curl -fsSL "$APP_URL" || true)"
          if [ -n "$PAGE_CONTENT" ] && ! echo "$PAGE_CONTENT" | grep -q "Hey, App Service developers!"; then
            echo "App content detected."
            exit 0
          fi
          echo "Default placeholder still present. Retrying in 10 seconds..."
          sleep 10
        done

        echo "::error::Deployment completed but Azure is still serving the default App Service placeholder page. In Azure Portal, switch the Web App from Container mode to Code mode and select Python runtime, then redeploy."
        exit 1
